[tools]
go = "1.26.3"

[tasks.build]
description = "Build all packages"
run = "go build ./..."

[tasks.test]
description = "Run unit tests"
run = "go test ./..."

[tasks."test:integration"]
description = "Run integration tests (requires Docker)"
run = "go test -tags=integration ./..."

[tasks."test:all"]
description = "Run unit and integration tests"
depends = ["test", "test:integration"]

[tasks.vet]
description = "Run go vet"
run = "go vet ./..."

[tasks."sqlc:generate"]
description = "Regenerate the sqlc db package"
run = "go tool sqlc generate"

[tasks.run]
description = "Run the server"
run = "go run ./cmd/substrate"

[tasks."bench:pure"]
description = "Run pure-logic micro-benchmarks (no Docker)"
run = "go test -run '^$' -bench . -benchmem -count=10 ./internal/policy/... ./internal/query/... ./internal/schema/... ./internal/projection/... ./internal/jsonx/..."

[tasks."bench:db"]
description = "Run DB-backed record benchmarks (requires Docker)"
run = "go test -tags=integration -run '^$' -bench . -benchmem -count=10 ./internal/record/..."

[tasks."bench:http"]
description = "Run HTTP end-to-end benchmarks (requires Docker)"
run = "go test -tags=integration -run '^$' -bench . -benchmem -count=10 ./internal/api/..."

[tasks.bench]
description = "Run all benchmark groups, teeing combined output to docs/benchmarks/runs/<timestamp>.txt"
run = '''
mkdir -p docs/benchmarks/runs
out="docs/benchmarks/runs/$(date +%Y%m%dT%H%M%S).txt"
{ go test -run '^$' -bench . -benchmem -count=10 ./internal/policy/... ./internal/query/... ./internal/schema/... ./internal/projection/... && \
  go test -tags=integration -run '^$' -bench . -benchmem -count=10 ./internal/record/... && \
  go test -tags=integration -run '^$' -bench . -benchmem -count=10 ./internal/api/...; } | tee "$out"
'''

[tasks."bench:baseline"]
description = "Refresh committed baselines (overwrites docs/benchmarks/baseline/*.txt)"
run = [
  "go test -run '^$' -bench . -benchmem -count=10 ./internal/policy/... ./internal/query/... ./internal/schema/... ./internal/projection/... ./internal/jsonx/... | tee docs/benchmarks/baseline/pure.txt",
  "go test -tags=integration -run '^$' -bench . -benchmem -count=10 ./internal/record/... | tee docs/benchmarks/baseline/db.txt",
  "go test -tags=integration -run '^$' -bench . -benchmem -count=10 ./internal/api/... | tee docs/benchmarks/baseline/http.txt",
]

[tasks."bench:compare"]
description = "Compare baseline vs new with benchstat. Usage: mise run bench:compare -- docs/benchmarks/baseline/pure.txt new.txt"
run = "go tool benchstat"

[tasks."bench:profile"]
description = "Profile a benchmark. Usage: mise run bench:profile -- -tags=integration -bench BenchmarkCreate ./internal/record/"
run = "go test -run '^$' -benchmem -cpuprofile cpu.out -memprofile mem.out"
